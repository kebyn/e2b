apiVersion: apps/v1
kind: Deployment
metadata:
  name: daytona-jaeger
  namespace: daytona
  labels:
    app.kubernetes.io/name: daytona-jaeger
    app.kubernetes.io/part-of: daytona
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: daytona-jaeger
  template:
    metadata:
      labels:
        app.kubernetes.io/name: daytona-jaeger
    spec:
      containers:
      - name: jaeger
        image: jaegertracing/all-in-one:1.67.0
        env:
        - name: COLLECTOR_OTLP_ENABLED
          value: "true"
        ports:
        - containerPort: 16686
          name: ui
        - containerPort: 4317
          name: otlp-grpc
        - containerPort: 4318
          name: otlp-http
        resources:
          requests:
            cpu: "250m"
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /
            port: 16686
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 16686
          initialDelaySeconds: 3
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: daytona-jaeger-collector
  namespace: daytona
spec:
  selector:
    app.kubernetes.io/name: daytona-jaeger
  ports:
  - name: otlp-grpc
    port: 4317
    targetPort: 4317
  - name: otlp-http
    port: 4318
    targetPort: 4318
---
apiVersion: v1
kind: Service
metadata:
  name: daytona-jaeger-query
  namespace: daytona
spec:
  selector:
    app.kubernetes.io/name: daytona-jaeger
  ports:
  - name: ui
    port: 16686
    targetPort: 16686
