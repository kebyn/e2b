apiVersion: apps/v1
kind: Deployment
metadata:
  name: daytona-proxy
  namespace: daytona
  labels:
    app.kubernetes.io/name: daytona-proxy
    app.kubernetes.io/part-of: daytona
    app.kubernetes.io/component: proxy
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: daytona-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: daytona-proxy
        app.kubernetes.io/component: proxy
    spec:
      serviceAccountName: daytona-proxy
      containers:
      - name: proxy
        image: daytonaio/daytona-proxy:0.157.0
        imagePullPolicy: IfNotPresent
        env:
        - name: PROXY_PORT
          value: "4000"
        - name: PROXY_PROTOCOL
          value: "https"
        - name: PROXY_API_KEY
          valueFrom:
            secretKeyRef:
              name: daytona-core
              key: proxy-api-key
        - name: DAYTONA_API_URL
          value: "http://daytona-api:3000/api"

        # ===== OIDC =====
        - name: OIDC_CLIENT_ID
          value: "daytona"
        - name: OIDC_CLIENT_SECRET
          value: ""
        - name: OIDC_DOMAIN
          value: "https://keycloak.${DOMAIN:-sandbox.company.com}/realms/daytona"
        - name: OIDC_PUBLIC_DOMAIN
          value: "https://keycloak.${DOMAIN:-sandbox.company.com}/realms/daytona"
        - name: OIDC_AUDIENCE
          value: "daytona"

        # ===== Redis =====
        - name: REDIS_HOST
          value: "daytona-redis-master"
        - name: REDIS_PORT
          value: "6379"

        # ===== Features =====
        - name: TOOLBOX_ONLY_MODE
          value: "false"
        - name: PREVIEW_WARNING_ENABLED
          value: "true"

        # ===== TLS =====
        - name: ENABLE_TLS
          value: "false"
          # TLS is handled by Ingress/LoadBalancer

        # ===== Timeouts =====
        - name: SHUTDOWN_TIMEOUT_SEC
          value: "3600"

        ports:
        - containerPort: 4000
          name: http
          protocol: TCP

        resources:
          requests:
            cpu: "500m"
            memory: 512Mi
          limits:
            cpu: "2"
            memory: 2Gi

        livenessProbe:
          httpGet:
            path: /health
            port: 4000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3

        readinessProbe:
          httpGet:
            path: /health
            port: 4000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3

        startupProbe:
          httpGet:
            path: /health
            port: 4000
          initialDelaySeconds: 5
          periodSeconds: 3
          failureThreshold: 20

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: daytona-proxy
              topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: daytona-proxy
  namespace: daytona
  labels:
    app.kubernetes.io/name: daytona-proxy
spec:
  selector:
    app.kubernetes.io/name: daytona-proxy
  ports:
  - name: http
    port: 4000
    targetPort: 4000
    protocol: TCP
  type: ClusterIP
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: daytona-proxy
  namespace: daytona
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: daytona-proxy
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: daytona-proxy
  namespace: daytona
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: daytona-proxy
  minReplicas: 2
  maxReplicas: 8
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
