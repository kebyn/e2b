apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: daytona-minio
  namespace: daytona
  labels:
    app.kubernetes.io/name: daytona-minio
    app.kubernetes.io/part-of: daytona
spec:
  serviceName: daytona-minio
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: daytona-minio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: daytona-minio
    spec:
      serviceAccountName: default
      containers:
      - name: minio
        image: minio/minio:RELEASE.2025-03-12T18-04-18Z
        command:
        - minio
        - server
        - /data
        - --console-address
        - ":9001"
        env:
        - name: MINIO_ROOT_USER
          valueFrom:
            secretKeyRef:
              name: daytona-s3
              key: access-key
        - name: MINIO_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: daytona-s3
              key: secret-key
        - name: MINIO_IDENTITY_STS_EXPIRY
          value: "24h"
        ports:
        - containerPort: 9000
          name: api
        - containerPort: 9001
          name: console
        volumeMounts:
        - name: data
          mountPath: /data
        resources:
          requests:
            cpu: "500m"
            memory: 1Gi
          limits:
            cpu: "2"
            memory: 4Gi
        livenessProbe:
          httpGet:
            path: /minio/health/live
            port: 9000
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /minio/health/ready
            port: 9000
          initialDelaySeconds: 5
          periodSeconds: 5
      # Init container to create bucket
      initContainers:
      - name: create-bucket
        image: minio/mc:RELEASE.2025-03-12T17-29-24Z
        command:
        - /bin/sh
        - -c
        - |
          mc alias set local http://daytona-minio:9000 $MINIO_ROOT_USER $MINIO_ROOT_PASSWORD
          mc mb --ignore-existing local/daytona
          mc mb --ignore-existing local/daytona-snapshots
          mc mb --ignore-existing local/daytona-volumes
        env:
        - name: MINIO_ROOT_USER
          valueFrom:
            secretKeyRef:
              name: daytona-s3
              key: access-key
        - name: MINIO_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: daytona-s3
              key: secret-key
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 100Gi
      storageClassName: ""  # Set to your StorageClass
---
apiVersion: v1
kind: Service
metadata:
  name: daytona-minio
  namespace: daytona
  labels:
    app.kubernetes.io/name: daytona-minio
spec:
  selector:
    app.kubernetes.io/name: daytona-minio
  ports:
  - name: api
    port: 9000
    targetPort: 9000
  - name: console
    port: 9001
    targetPort: 9001
