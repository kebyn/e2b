# Docker Registry (alternative to Harbor for lightweight setups)
# For production, consider using Harbor: helm install harbor harbor/harbor -n daytona
apiVersion: apps/v1
kind: Deployment
metadata:
  name: daytona-registry
  namespace: daytona
  labels:
    app.kubernetes.io/name: daytona-registry
    app.kubernetes.io/part-of: daytona
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: daytona-registry
  template:
    metadata:
      labels:
        app.kubernetes.io/name: daytona-registry
    spec:
      containers:
      - name: registry
        image: registry:2.8.2
        env:
        - name: REGISTRY_HTTP_ADDR
          value: "0.0.0.0:5000"
        - name: REGISTRY_STORAGE_DELETE_ENABLED
          value: "true"
        - name: REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY
          value: /var/lib/registry
        ports:
        - containerPort: 5000
        volumeMounts:
        - name: data
          mountPath: /var/lib/registry
        - name: auth
          mountPath: /auth
          readOnly: true
        resources:
          requests:
            cpu: "250m"
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /v2/
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /v2/
            port: 5000
          initialDelaySeconds: 3
          periodSeconds: 5
      volumes:
      - name: auth
        secret:
          secretName: daytona-registry
          items:
          - key: htpasswd
            path: htpasswd
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 100Gi
      storageClassName: ""
---
apiVersion: v1
kind: Service
metadata:
  name: daytona-registry
  namespace: daytona
  labels:
    app.kubernetes.io/name: daytona-registry
spec:
  selector:
    app.kubernetes.io/name: daytona-registry
  ports:
  - name: http
    port: 5000
    targetPort: 5000
---
# Registry UI (optional, for debugging)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: daytona-registry-ui
  namespace: daytona
  labels:
    app.kubernetes.io/name: daytona-registry-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: daytona-registry-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: daytona-registry-ui
    spec:
      containers:
      - name: ui
        image: joxit/docker-registry-ui:main
        env:
        - name: SINGLE_REGISTRY
          value: "true"
        - name: REGISTRY_TITLE
          value: "Daytona Registry"
        - name: NGINX_PROXY_PASS_URL
          value: "http://daytona-registry:5000"
        - name: REGISTRY_SECURED
          value: "false"
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: daytona-registry-ui
  namespace: daytona
spec:
  selector:
    app.kubernetes.io/name: daytona-registry-ui
  ports:
  - port: 80
    targetPort: 80
