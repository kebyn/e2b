auth:
  enabled: true
  existingSecret: daytona-redis
  existingSecretPasswordKey: password

architecture: replication

master:
  resources:
    requests:
      cpu: "500m"
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 4Gi
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""  # Set to your StorageClass
  extraFlags:
    - "--maxmemory-policy allkeys-lru"
    - "--maxmemory 3gb"
    - "--save 900 1"
    - "--save 300 10"
    - "--save 60 10000"
  service:
    ports:
      redis: 6379

replica:
  replicaCount: 2
  resources:
    requests:
      cpu: "250m"
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""

metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    namespace: daytona
