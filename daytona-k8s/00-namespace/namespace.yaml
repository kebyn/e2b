apiVersion: v1
kind: Namespace
metadata:
  name: daytona
  labels:
    app.kubernetes.io/part-of: daytona
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: daytona-quota
  namespace: daytona
spec:
  hard:
    requests.cpu: "64"
    requests.memory: 128Gi
    limits.cpu: "128"
    limits.memory: 256Gi
    pods: "100"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: daytona-limits
  namespace: daytona
spec:
  limits:
  - default:
      cpu: "500m"
      memory: 512Mi
    defaultRequest:
      cpu: "100m"
      memory: 128Mi
    type: Container
