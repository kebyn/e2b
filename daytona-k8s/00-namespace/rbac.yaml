apiVersion: v1
kind: ServiceAccount
metadata:
  name: daytona-api
  namespace: daytona
  labels:
    app.kubernetes.io/name: daytona-api
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: daytona-proxy
  namespace: daytona
  labels:
    app.kubernetes.io/name: daytona-proxy
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: daytona-ssh-gateway
  namespace: daytona
  labels:
    app.kubernetes.io/name: daytona-ssh-gateway
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: daytona-runner
  namespace: daytona
  labels:
    app.kubernetes.io/name: daytona-runner
---
# Runner needs access to Docker socket and host resources
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: daytona-runner
  labels:
    app.kubernetes.io/name: daytona-runner
rules:
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch", "create", "delete"]
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: daytona-runner
  labels:
    app.kubernetes.io/name: daytona-runner
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: daytona-runner
subjects:
- kind: ServiceAccount
  name: daytona-runner
  namespace: daytona
