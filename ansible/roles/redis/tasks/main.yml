---
# Redis 安装和配置

- name: 添加 Redis APT 仓库
  deb822_repository:
    name: redislabs-redis
    types:
      - deb
    uris:
      - http://ppa.launchpad.net/redislabs/redis/ubuntu
    suites:
      - "{{ ansible_distribution_release }}"
    components:
      - main
    signed_by: "https://keyserver.ubuntu.com/pks/lookup?op=get&search=0xCC59E6B43FA6E3CA"
    install_python_debian: true
    state: present
  register: redis_apt_repository

- name: 更新 Redis APT 缓存
  apt:
    update_cache: yes
  when: redis_apt_repository.changed

- name: 安装 Redis
  apt:
    name:
      - redis-server
      - redis-sentinel
    state: present

- name: 配置 Redis
  template:
    src: redis.conf.j2
    dest: /etc/redis/redis.conf
    owner: redis
    group: redis
    mode: '0640'
  notify: restart redis

- name: 配置 Redis Sentinel
  template:
    src: sentinel.conf.j2
    dest: /etc/redis/sentinel.conf
    owner: redis
    group: redis
    mode: '0640'
  notify: restart redis-sentinel

- name: 创建 Redis 数据目录
  file:
    path: /var/lib/redis
    state: directory
    owner: redis
    group: redis
    mode: '0750'

- name: 立即应用 Redis 配置变更
  meta: flush_handlers

- name: 启动 Redis
  systemd:
    name: redis-server
    state: started
    enabled: yes

- name: 启动 Redis Sentinel
  systemd:
    name: redis-sentinel
    state: started
    enabled: yes

- name: 等待 Redis 就绪
  wait_for:
    port: "{{ redis_port }}"
    delay: 2
    timeout: 30

- name: 等待 Sentinel 就绪
  wait_for:
    port: "{{ redis_sentinel_port }}"
    delay: 2
    timeout: 30
